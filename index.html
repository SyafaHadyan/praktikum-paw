<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ギャラリー</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="gallery-page">
    <h1 class="gallery-title">ギャラリー</h1>

    <div class="gallery-grid">

      <a href="./character/tanga-ibuki/" class="card">
        <div class="card-picture">
          <img src="./assets/images/tanga-ibuki.png" alt="丹花イブキ" />
        </div>
        <p class="card-name">丹花イブキ</p>
      </a>

      <a href="./character/arona/" class="card">
        <div class="card-picture">
          <img src="./assets/images/arona.png" alt="アロナ" />
        </div>
        <p class="card-name">アロナ</p>
      </a>

      <a href="./character/uzawa-reisa/" class="card">
        <div class="card-picture">
          <img src="./assets/images/uzawa-reisa.png" alt="宇沢レイサ" />
        </div>
        <p class="card-name">宇沢レイサ</p>
      </a>

      <a href="./character/sorasaki-hina/" class="card">
        <div class="card-picture">
          <img src="./assets/images/sorasaki-hina.png" alt="空崎ヒナ" />
        </div>
        <p class="card-name">空崎ヒナ</p>
      </a>

      <a href="./character/ryuuge-kisaki/" class="card">
        <div class="card-picture">
          <img src="./assets/images/ryuuge-kisaki.png" alt="竜華キサキ" />
        </div>
        <p class="card-name">竜華キサキ</p>
      </a>

      <a href="./character/tendou-arisu/" class="card">
        <div class="card-picture">
          <img src="./assets/images/tendou-arisu.png" alt="天童アリス" />
        </div>
        <p class="card-name">天童アリス</p>
      </a>

      <a href="./character/tachibana-hikari/" class="card">
        <div class="card-picture">
          <img src="./assets/images/tachibana-hikari.png" alt="橘ヒカリ" />
        </div>
        <p class="card-name">橘ヒカリ</p>
      </a>

      <a href="./character/hayase-yuuka/" class="card">
        <div class="card-picture">
          <img src="./assets/images/hayase-yuuka.png" alt="早瀬ユウカ" />
        </div>
        <p class="card-name">早瀬ユウカ</p>
      </a>

    </div>
  </main>
</body>
</html>
